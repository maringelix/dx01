services:
  postgres:
    image: postgres:16-alpine
    container_name: dx01-postgres
    environment:
      POSTGRES_DB: dx01_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dx01_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dx01-app
    ports:
      - "80:80"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dx01_dev
      DB_USER: postgres
      DB_PASSWORD: changeme
      CORS_ORIGIN: http://localhost
      JWT_SECRET: local_development_secret_minimum_32_chars
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: